<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenHermit Web</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Connect screen -->
    <div class="connect-screen" id="connect-screen">
      <form class="connect-form" id="connect-form">
        <p class="eyebrow">OpenHermit</p>
        <h1>Connect to Agent</h1>
        <p class="connect-form__hint">Enter your gateway connection details to start chatting.</p>

        <label class="field">
          <span class="field__label">Gateway URL</span>
          <input class="field__input" id="connect-gateway-url" type="url" placeholder="http://localhost:4000" required />
        </label>

        <label class="field">
          <span class="field__label">Agent ID</span>
          <input class="field__input" id="connect-agent-id" type="text" placeholder="one" required />
        </label>

        <label class="field">
          <span class="field__label">Token</span>
          <input class="field__input" id="connect-token" type="password" placeholder="Optional" />
        </label>

        <p class="connect-form__error" id="connect-error"></p>

        <button class="button button--primary connect-form__submit" id="connect-button" type="submit">
          Connect
        </button>
      </form>
    </div>

    <!-- Chat shell (hidden until connected) -->
    <div class="shell" id="chat-shell" hidden>
      <aside class="sidebar">
        <div class="sidebar__top">
          <p class="eyebrow">OpenHermit</p>
          <h1>Web Chat</h1>
          <p class="sidebar__meta" id="agent-meta">Connecting...</p>
          <div class="sidebar__buttons">
            <button class="button button--primary" id="new-session-button" type="button">
              New Session
            </button>
            <button class="button button--ghost" id="disconnect-button" type="button">
              Disconnect
            </button>
          </div>
        </div>
        <div class="sidebar__list" id="sessions-list"></div>
      </aside>

      <main class="chat">
        <header class="chat__header">
          <div>
            <p class="eyebrow">Current Session</p>
            <h2 id="session-title">No session selected</h2>
          </div>
          <p class="chat__status" id="connection-status">Idle</p>
        </header>

        <section class="chat__messages" id="messages"></section>

        <form class="composer" id="composer">
          <textarea
            id="composer-input"
            rows="3"
            placeholder="Ask OpenHermit to inspect files, run code, search memory, or continue a previous thread..."
          ></textarea>
          <div class="composer__actions">
            <p class="composer__hint">Sessions are local to this web client. Use the sidebar to resume any earlier thread.</p>
            <button class="button button--primary" id="send-button" type="submit">
              Send
            </button>
          </div>
        </form>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
