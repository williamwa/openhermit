services:
  postgres:
    image: postgres:16-alpine
    ports: ["5433:5432"]
    environment:
      POSTGRES_USER: openhermit
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: openhermit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openhermit"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
