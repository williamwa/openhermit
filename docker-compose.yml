services:
  postgres:
    image: postgres:16-alpine
    ports: ["127.0.0.1:5433:5432"]
    environment:
      POSTGRES_USER: openhermit
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: openhermit
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openhermit"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
